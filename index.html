<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GO TO JAIL</title>
  <meta property="og:title" content="GO TO JAIL">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-primary: #ffffff;
      --color-accent: #ff3131;
      --color-bg: #0a0a0a;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Flashing red/blue police lights */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      animation: police-lights 2s infinite;
      opacity: 0.06;
    }

    @keyframes police-lights {
      0%, 100% { background: transparent; }
      10%, 30% { background: #ff0000; }
      40%, 60% { background: transparent; }
      70%, 90% { background: #0044ff; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      z-index: 1;
    }

    .title {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(255, 49, 49, 0.5), 0 0 40px rgba(255, 49, 49, 0.3);
      animation: title-pulse 2s ease-in-out infinite;
    }

    @keyframes title-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    .mugshot-frame {
      position: relative;
      width: 300px;
      height: 300px;
      border: 4px solid #333;
      background: #1a1a1a;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .mugshot-frame .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mugshot-frame .jail-bars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
      mix-blend-mode: multiply;
    }

    .mugshot-frame .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      background: #222;
      color: #555;
    }

    .handle {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    .reason {
      font-size: 1.2rem;
      color: #ccc;
      max-width: 500px;
      text-align: center;
      line-height: 1.5;
      padding: 1rem 1.5rem;
      background: rgba(255, 49, 49, 0.08);
      border: 1px solid rgba(255, 49, 49, 0.2);
      border-radius: 8px;
    }

    .reason::before {
      content: '"';
    }

    .reason::after {
      content: '"';
    }

    .verdict {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin-top: 0.5rem;
    }

    .error-state {
      text-align: center;
      padding: 2rem;
    }

    .error-state h1 {
      color: var(--color-accent);
      margin-bottom: 1rem;
    }

    .error-state p {
      color: #888;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .error-state code {
      background: #1a1a1a;
      padding: 0.2em 0.5em;
      border-radius: 4px;
      font-size: 0.9rem;
      color: #ccc;
    }

    @media (max-width: 480px) {
      .title {
        font-size: 1.8rem;
      }

      .mugshot-frame {
        width: 240px;
        height: 240px;
      }

      .handle {
        font-size: 1.4rem;
      }

      .reason {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const config = {
      user: params.get('user'),
      message: params.get('message'),
      avatar: params.get('avatar'),
    };

    function showError() {
      document.getElementById('app').innerHTML = `
        <div class="error-state">
          <h1>No one to jail... yet</h1>
          <p>
            Use the CLI to send someone to jail:<br><br>
            <code>./jail.sh &lt;slack_handle&gt; "reason"</code>
          </p>
        </div>
      `;
    }

    function render() {
      if (!config.user) {
        showError();
        return;
      }

      const app = document.getElementById('app');

      // Dynamic OG tags
      document.title = `${config.user} — GO TO JAIL`;
      const ogTitle = document.querySelector('meta[property="og:title"]');
      if (ogTitle) ogTitle.content = `${config.user} must GO TO JAIL`;

      let avatarHtml;
      if (config.avatar) {
        avatarHtml = `<img class="avatar" src="${config.avatar}" alt="${config.user}" referrerpolicy="no-referrer">`;
      } else {
        avatarHtml = `<div class="avatar-placeholder">?</div>`;
      }

      let reasonHtml = '';
      if (config.message) {
        reasonHtml = `<div class="reason">${escapeHtml(config.message)}</div>`;
      }

      app.innerHTML = `
        <div class="title">Go To Jail</div>
        <div class="mugshot-frame">
          ${avatarHtml}
          <img class="jail-bars" src="jail-cell-prison.gif" alt="jail bars">
        </div>
        <div class="handle">@${escapeHtml(config.user)}</div>
        ${reasonHtml}
        <div class="verdict">Guilty</div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    render();
  </script>
</body>
</html>
